services:
  postgres:
    image: postgres:latest
    container_name: conduit-postgres
    environment:
      POSTGRES_DB: transcripts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:latest
    container_name: conduit-valkey
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conduit-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/transcripts
      VALKEY_URL: redis://valkey:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    volumes:
      - .:/app

volumes:
  postgres_data:
    driver: local
